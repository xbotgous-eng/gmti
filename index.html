<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GMTI · 你是哪种游戏玩家</title>
<meta name="description" content="GMTI 游戏人格测试 · 4 维 16 型 · 12 道题找到你的本命游戏">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #f5f0e8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #2a2a2a;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 210, 63, 0.18) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(143, 174, 157, 0.20) 0%, transparent 40%),
      #f5f0e8;
  }
  #app {
    max-width: 390px;
    width: 100%;
    min-height: 100vh;
    padding: 24px 20px 40px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ====== 公共组件 ====== */
  .btn {
    display: inline-block;
    background: #2a2a2a;
    color: #fff;
    border: none;
    padding: 16px 28px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    letter-spacing: 0.5px;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .btn-light {
    background: #fff;
    color: #2a2a2a;
    border: 2px solid #2a2a2a;
  }

  .pixel-img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }

  /* ====== 封面 ====== */
  .cover {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 32px 0 24px;
    gap: 20px;
  }
  .cover .tag {
    font-size: 12px;
    letter-spacing: 4px;
    color: #999;
    text-transform: uppercase;
  }
  .cover h1 {
    font-size: 36px;
    font-weight: 900;
    line-height: 1.2;
    color: #1a1a1a;
  }
  .cover h1 .accent { color: #FF6B35; }
  .cover .sub {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    max-width: 280px;
  }

  /* 跑马灯 */
  .marquee-wrap {
    width: 100vw;
    margin-left: calc(-50vw + 50%); /* 突破容器宽度限制 */
    overflow: hidden;
    position: relative;
    padding: 8px 0;
    mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }
  .marquee-track {
    display: flex;
    gap: 16px;
    width: max-content;
    animation: marquee 30s linear infinite;
  }
  .marquee-wrap.reverse .marquee-track {
    animation: marquee-reverse 35s linear infinite;
  }
  .marquee-track img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    flex-shrink: 0;
    image-rendering: pixelated;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes marquee-reverse {
    from { transform: translateX(-50%); }
    to { transform: translateX(0); }
  }

  .cover .meta {
    font-size: 12px;
    color: #999;
    display: flex;
    gap: 16px;
    margin-top: -8px;
  }
  .cover .meta span::before { content: "·"; margin-right: 6px; color: #ccc; }
  .cover .meta span:first-child::before { content: ""; margin: 0; }

  .cover .credit {
    font-size: 11px;
    color: #bbb;
    margin-top: auto;
  }

  /* ====== 题目页 ====== */
  .quiz {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding-top: 8px;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .progress-bar {
    height: 6px;
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B35, #FFD23F);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: #999;
    text-align: right;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  .quiz-hint {
    background: #fff;
    border: 2px solid #2a2a2a;
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 13px;
    color: #555;
    display: inline-block;
    position: relative;
    margin-bottom: 18px;
    max-width: 100%;
    box-shadow: 3px 3px 0 #2a2a2a;
  }
  .quiz-hint::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 24px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-right: 2px solid #2a2a2a;
    border-bottom: 2px solid #2a2a2a;
    transform: rotate(45deg);
  }

  .quiz-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 28px;
    color: #1a1a1a;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: #fff;
    border: 2px solid #2a2a2a;
    border-radius: 18px;
    padding: 18px 20px;
    font-size: 15px;
    line-height: 1.5;
    color: #2a2a2a;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s ease;
    box-shadow: 3px 3px 0 #2a2a2a;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }
  .option:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #2a2a2a;
  }
  .option.selected {
    background: #FFD23F;
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #2a2a2a;
  }
  .option .key {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #2a2a2a;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .option.selected .key { background: #2a2a2a; }

  /* ====== 加载页 ====== */
  .loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 24px;
  }
  .loading img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    flex-shrink: 0;
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
  }
  .loading h2 { font-size: 22px; font-weight: 700; }
  .loading .step {
    font-size: 14px;
    color: #666;
    height: 22px;
  }
  .loading .dots {
    display: inline-block;
    width: 24px;
    text-align: left;
  }

  /* ====== 结果页 ====== */
  .result { animation: slideIn 0.4s ease; }
  .result-hero {
    background: linear-gradient(135deg, var(--c1, #FF6B35), var(--c2, #FFD23F));
    border-radius: 28px;
    padding: 28px 22px 32px;
    text-align: center;
    color: #fff;
    margin-bottom: 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.10);
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='rgba(255,255,255,0.15)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .result-hero .code {
    font-size: 14px;
    letter-spacing: 6px;
    font-weight: 700;
    margin-bottom: 4px;
    opacity: 0.95;
  }
  .result-hero .ip {
    width: 240px;
    height: 240px;
    object-fit: contain;
    display: block;
    margin: 8px auto;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
  }
  .result-hero h2 {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .result-hero .subtitle {
    font-size: 14px;
    opacity: 0.92;
    line-height: 1.5;
  }
  .quote {
    background: #fff;
    border: 2px solid #2a2a2a;
    border-radius: 20px;
    padding: 22px 20px;
    font-size: 16px;
    line-height: 1.6;
    color: #2a2a2a;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 500;
    box-shadow: 4px 4px 0 #2a2a2a;
    position: relative;
  }
  .quote::before { content: "「"; color: #FF6B35; font-size: 32px; line-height: 0; vertical-align: -8px; margin-right: 2px; }
  .quote::after { content: "」"; color: #FF6B35; font-size: 32px; line-height: 0; vertical-align: -8px; margin-left: 2px; }

  .section { margin-bottom: 24px; }
  .section h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section h3::before {
    content: "";
    width: 4px;
    height: 16px;
    background: #FF6B35;
    border-radius: 4px;
  }
  .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .trait {
    background: #fff;
    border: 1.5px solid #2a2a2a;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    color: #2a2a2a;
  }
  .desc {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    font-size: 14px;
    line-height: 1.8;
    color: #444;
    border: 1.5px solid rgba(0,0,0,0.06);
  }

  /* 字母拆解卡片 */
  .dims { display: flex; flex-direction: column; gap: 10px; }
  .dim-row {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .dim-label {
    font-size: 11px;
    color: #999;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .dim-versus {
    display: flex;
    align-items: stretch;
    gap: 10px;
  }
  .dim-side { flex: 1; padding: 8px 4px; border-radius: 10px; transition: all 0.2s; }
  .dim-side.you {
    background: linear-gradient(135deg, var(--c1, #FF6B35), var(--c2, #FFD23F));
    color: #fff;
    padding: 12px;
  }
  .dim-side.other {
    background: rgba(0,0,0,0.03);
    color: #aaa;
    padding: 12px;
  }
  .dim-letter {
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 2px;
  }
  .dim-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .dim-desc {
    font-size: 11px;
    line-height: 1.5;
    opacity: 0.92;
  }
  .dim-vs {
    align-self: center;
    color: #ccc;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .games {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .game-card {
    background: #fff;
    border: 1.5px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .game-rank {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--c1, #FF6B35), var(--c2, #FFD23F));
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .game-icon {
    width: 92px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--c1, #FF6B35), var(--c2, #FFD23F));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
    overflow: hidden;
  }
  .game-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .game-info { flex: 1; min-width: 0; }
  .game-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
  .game-meta { font-size: 11px; color: #999; }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
  }
  .actions .btn { width: 100%; }
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -8px); }

  .footer-tip {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ============ 数据：12 道测试题 ============
const QUESTIONS = [
  // ========== E vs A · 动力来源 ==========
  { text: "新游戏下载了一晚上，进度条刚跑完，屏幕一亮——眼前是一张大到看不到边的地图，几十个金色问号在远处闪个不停", hint: "你的手指停了 0.5 秒，下一秒要往哪儿迈", options: [
    { text: "径直朝最远那个问号狂奔，主线？等我先去看看那个山头上到底有什么东西", dim: "E" },
    { text: "深呼吸，老老实实顺着金色箭头走主线，问号留着——回头我会一个一个清干净的", dim: "A" },
    { text: "原地不动，先打开菜单把所有按键摸一遍，地图缩到最大研究路线，磨刀不误砍柴工", dim: "A" }
  ]},
  { text: "你玩得正开心，屏幕右上角咚地弹出一个隐藏成就：「连续 30 天每天上线打卡」。30 天，每天，一天不能漏", hint: "你看到的瞬间，脑子里那句话是", options: [
    { text: "30 天就为了一个图标？我连健身卡都没坚持过 30 天，这玩意儿放我面前是侮辱我", dim: "E" },
    { text: "瞄了眼日历开始倒数：第 1 天，已设闹钟，已记仇，那个图标必须挂在我档案上", dim: "A" },
    { text: "假装这个提示从未出现，关掉，继续做我刚才在做的事，打卡是给牛马的", dim: "E" }
  ]},
  { text: "你刚刚通关了一个让你心头一颤的游戏，演职员表在慢慢往上滚，BGM 余韵还在，手柄在腿上躺着", hint: "屏幕暗下来那一刻，你的反应是", options: [
    { text: "直接退游戏，打开商店搜「下一个该玩什么」，旧爱已经配不上现在升级了的我", dim: "E" },
    { text: "二话不说点新游戏 +，二周目走起，所有结局我都要看，所有支线我都要刷", dim: "A" },
    { text: "盯着结局画面发呆三分钟，舍不得退，回头看主角的背影看了又看，世界我还没看够", dim: "E" }
  ]},

  // ========== T vs R · 应战姿势 ==========
  { text: "一个 Boss 把你按在地上摩擦了五次，血条秒空，连它出过几招你都数不清，载入画面已经看到能背下来", hint: "第六次开始之前，你的真实状态是", options: [
    { text: "暂停！手机备忘录打开，把它前三招的节奏抄下来，画个时序图，下一次我要带答案进场", dim: "T" },
    { text: "直接 F 键再上，手感这东西只能在死里练出来，第六次第七次第八次，总有一次它要倒下", dim: "R" },
    { text: "退游戏先去搜攻略和教学视频，对照自己的死亡录像看一遍，准备充分了我再回来报仇", dim: "T" }
  ]},
  { text: "新手教程一进去就是 20 分钟的长视频，把整个游戏的系统、合成、技能全讲了一遍，跳过键灰着不让按", hint: "讲到一半的时候你在干嘛", options: [
    { text: "记忆宫殿启动，重要的还截了图，关键数值抄在便签上，理解透了我才敢动手", dim: "T" },
    { text: "前三秒还在听，从第四秒开始狂按跳过键，跳不掉就划手机，会用了再说啊各位", dim: "R" },
    { text: "半听半走神，看完只记住 NPC 那句「祝你好运」，反正不会的回头再查", dim: "R" }
  ]},
  { text: "面前两条路：一条又快又险（路上一堆怪和陷阱），一条又远又稳（绕一大圈但 0 风险）。任务时间还剩 10 分钟", hint: "你的本能选择是", options: [
    { text: "走险的那条，路上想办法就行，死了重来一遍，浪费在绕路上才是真亏", dim: "R" },
    { text: "走安全那条，稳扎稳打不浪费一滴血，复活时间够我打两把别的，性价比拉满", dim: "T" },
    { text: "先存档，两条都跑一遍看哪个收益高，回头记下来，下次面对相似的路口我就有数了", dim: "T" }
  ]},

  // ========== S vs C · 社交模式 ==========
  { text: "周五晚 11 点，你瘫在床上耳机一戴，灯关了，屏幕一亮，世界只剩你一个人——手机咚地震了一下，朋友消息", hint: "「一起来一把？」你的反应是", options: [
    { text: "「来！等我十秒」秒回，立刻把单人存档退掉，组队语音一开就是几个小时", dim: "C" },
    { text: "「今晚不了我想自己玩」回完手机扔床头，耳机一推继续沉浸我的世界，谁也别打扰", dim: "S" },
    { text: "「几个人？太多人我有点累」先打听场面再决定，3 个以内可以，6 个我直接装睡", dim: "S" }
  ]},
  { text: "团战打到一半眼看要崩，队友开始在公屏互相挂人甩锅，「全是你的错」「不是我先死的吗」，气氛瞬间冰点", hint: "这时候的你在干嘛", options: [
    { text: "默默把麦克风关了，把公屏折叠了，自己专心打完最后一波，眼不见心不烦", dim: "S" },
    { text: "立刻打字「没事下把翻盘」「都别说了一起加油」，团队胶水非我莫属，我就是来粘合大家的", dim: "C" },
    { text: "直接挂机摆烂，掏出手机刷视频，烦死了一群人吵架，老子先去厕所冷静一下", dim: "S" }
  ]},
  { text: "你最近发现了一个宝藏游戏，玩了三个小时还停不下来，眼睛都酸了但嘴角是笑的", hint: "好东西到手的那个瞬间，你的第一反应是", options: [
    { text: "默默享受，先一个人通关再说，安利？等我玩透了再考虑要不要分享出来", dim: "S" },
    { text: "立刻拉群发链接「都给我去玩！不玩不是兄弟」「赶紧的我等你们一起讨论」", dim: "C" },
    { text: "朋友圈发一张神秘截图配「DM 我」，等着同好自己找上门来，悄悄筛人", dim: "C" }

// ============ 计分逻辑 ============
function calcResult(answers) {
  const scores = { E:0, A:0, T:0, R:0, S:0, C:0, N:0, M:0 };
  answers.forEach((dim) => {
    // N 维度因题目较少（3 票），单票加权 1.5
    const weight = (dim === "N") ? 1.5 : 1;
    scores[dim] = (scores[dim] || 0) + weight;
  });
  const code =
    (scores.E >= scores.A ? "E" : "A") +
    (scores.T >= scores.R ? "T" : "R") +
    (scores.S >= scores.C ? "S" : "C") +
    (scores.N >= scores.M ? "N" : "M");
  return code;
}

// ============ 游戏匹配：按维度命中数 + 热度 ============
function recommendGames(code) {
  // 计算每款游戏与用户的"维度相似度"
  // 算法：把 code 拆成 4 个字母（如 ATCM），对每个游戏 tags 列表中的 type
  //   做"同位字母匹配数"，累加得分；再加上热度 pop * 0.2 作小幅加权
  const ranked = GAMES.map(g => {
    let dimScore = 0;
    g.tags.forEach((tag, idx) => {
      // tags 顺序代表适配优先级，第 1 个 +3，第 2 个 +2，第 3 个 +1
      const priorityWeight = [3, 2, 1][idx] || 1;
      let matchCount = 0;
      for (let i = 0; i < 4; i++) {
        if (tag[i] === code[i]) matchCount++;
      }
      // 4 个字母全匹配 = 满分，否则按比例
      dimScore += (matchCount / 4) * priorityWeight;
    });
    // 热度加权（最高 +1.0），避免冷门游戏一直挤掉热门
    const popBonus = (g.pop / 5) * 1.0;
    return { ...g, score: dimScore + popBonus };
  });
  ranked.sort((a, b) => b.score - a.score);
  return ranked.slice(0, 5);
}

// ============ 状态 ============
const state = {
  page: "cover",  // cover | quiz | loading | result
  qIdx: 0,
  answers: [],
  result: null,
};

// 从 URL hash 恢复结果（用于分享链接）
function loadFromHash() {
  const hash = window.location.hash.slice(1);
  if (hash && hash.length === 4 && RESULTS[hash]) {
    state.result = hash;
    state.page = "result";
  }
}

function getPalette(code) {
  const key = code[0] + code[1]; // ET/ER/AT/AR
  return PALETTES[key] || PALETTES.ER;
}

// ============ 渲染 ============
function $(sel) { return document.querySelector(sel); }

function showToast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function render() {
  const app = $("#app");
  if (state.page === "cover") renderCover(app);
  else if (state.page === "quiz") renderQuiz(app);
  else if (state.page === "loading") renderLoading(app);
  else if (state.page === "result") renderResult(app);
  window.scrollTo(0, 0);
}

function renderCover(app) {
  // 16 个动物 → 跑马灯两行（一行 8 个 + 复制一份保证无缝循环；第二行反向）
  const animals = Object.values(ANIMALS);
  const row1 = animals.slice(0, 8);
  const row2 = animals.slice(8);
  const rowHtml = (arr) => arr.concat(arr).map(a => `<img src="${CDN_BASE}${a}.png" alt="">`).join('');
  app.innerHTML = `
    <div class="cover">
      <div class="tag">G · M · T · I</div>
      <h1>你是哪种<br><span class="accent">游戏玩家</span>？</h1>
      <div class="sub">4 维度 16 型 · 12 道题<br>找到最适合你的本命游戏</div>
      <div class="marquee-wrap">
        <div class="marquee-track">${rowHtml(row1)}</div>
      </div>
      <div class="marquee-wrap reverse">
        <div class="marquee-track">${rowHtml(row2)}</div>
      </div>
      <button class="btn" onclick="startQuiz()">开始测试 →</button>
      <div class="meta">
        <span>12 道题</span><span>约 3 分钟</span><span>16 种结果</span>
      </div>
      <div class="credit">GMTI · Game-MBTI · 灵感参考 @乔纳森李 DOGTI</div>
    </div>
  `;
}

function renderQuiz(app) {
  const q = QUESTIONS[state.qIdx];
  const progress = ((state.qIdx) / QUESTIONS.length) * 100;
  app.innerHTML = `
    <div class="quiz">
      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
      <div class="progress-text">${state.qIdx + 1} / ${QUESTIONS.length}</div>
      <div class="quiz-hint">${q.hint}</div>
      <div class="quiz-title">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="answer('${opt.dim}', this)">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${opt.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderLoading(app) {
  const steps = ["正在分析你的探索倾向", "正在计算策略偏好", "正在匹配你的本命游戏", "马上揭晓..."];
  let step = 0;
  app.innerHTML = `
    <div class="loading">
      <img src="${CDN_BASE}cat.png" class="pixel-img" alt="">
      <h2>正在为你解读...</h2>
      <div class="step" id="step">${steps[0]}<span class="dots">...</span></div>
    </div>
  `;
  const timer = setInterval(() => {
    step++;
    if (step >= steps.length) {
      clearInterval(timer);
      // 计算结果
      const code = calcResult(state.answers);
      state.result = code;
      state.page = "result";
      window.location.hash = code;
      render();
      return;
    }
    const el = $("#step");
    if (el) el.innerHTML = `${steps[step]}<span class="dots">...</span>`;
  }, 700);
}

function renderResult(app) {
  const code = state.result;
  const r = RESULTS[code];
  const animal = ANIMALS[code];
  const pal = getPalette(code);
  const games = recommendGames(code);
  app.innerHTML = `
    <div class="result" style="--c1: ${pal.c1}; --c2: ${pal.c2};">
      <div class="result-hero">
        <div class="code">${code.split('').join(' · ')}</div>
        <img src="${CDN_BASE}${animal}.png" class="pixel-img ip" alt="" crossorigin="anonymous">
        <h2>${r.title}</h2>
        <div class="subtitle">${r.subtitle}</div>
      </div>

      <div class="quote">${r.quote}</div>

      <div class="section">
        <h3>你的 GMTI 拆解</h3>
        <div class="dims">
          ${DIMENSIONS.map((dim, i) => {
            const myLetter = code[i];
            const youSide = (myLetter === dim.pos.letter) ? dim.pos : dim.neg;
            const otherSide = (myLetter === dim.pos.letter) ? dim.neg : dim.pos;
            return `
              <div class="dim-row">
                <div class="dim-label">${dim.label}</div>
                <div class="dim-versus">
                  <div class="dim-side you">
                    <div class="dim-letter">${youSide.letter}</div>
                    <div class="dim-name">${youSide.name}</div>
                    <div class="dim-desc">${youSide.desc}</div>
                  </div>
                  <div class="dim-vs">VS</div>
                  <div class="dim-side other">
                    <div class="dim-letter">${otherSide.letter}</div>
                    <div class="dim-name">${otherSide.name}</div>
                    <div class="dim-desc">${otherSide.desc}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="section">
        <h3>你的关键词</h3>
        <div class="traits">
          ${r.traits.map(t => `<div class="trait">${t}</div>`).join('')}
        </div>
      </div>

      <div class="section">
        <h3>你这种人是这样的</h3>
        <div class="desc">${r.desc}</div>
      </div>

      <div class="section">
        <h3>为你匹配的 5 款本命游戏</h3>
        <div class="games">
          ${games.map((g, i) => `
            <div class="game-card">
              <div class="game-rank">${i + 1}</div>
              <div class="game-icon">${g.ic ? `<img src="${g.ic}" alt="${g.n}" onerror="this.parentNode.innerHTML='${gameEmoji(g.t)}'">` : gameEmoji(g.t)}</div>
              <div class="game-info">
                <div class="game-name">${g.n}</div>
                <div class="game-meta">${g.t} · ${g.p}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="actions">
        <button class="btn" onclick="copyShareLink()">📋 复制链接 · 测测你朋友</button>
        <button class="btn btn-light" onclick="restart()">↻ 再测一次</button>
      </div>

      <div class="footer-tip">
        把链接发到群里，<br>看看你和谁是同一型 🎮
      </div>
    </div>
  `;
}

// ============ 行为 ============
function startQuiz() {
  state.qIdx = 0;
  state.answers = [];
  state.page = "quiz";
  render();
}

function answer(dim, btn) {
  // 视觉反馈
  btn.classList.add('selected');
  state.answers.push(dim);
  setTimeout(() => {
    state.qIdx++;
    if (state.qIdx >= QUESTIONS.length) {
      state.page = "loading";
    }
    render();
  }, 280);
}

function copyShareLink() {
  const url = window.location.origin + window.location.pathname + "#" + state.result;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('链接已复制'); }
    catch (e) { showToast(url); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(
      () => showToast('链接已复制 ✓'),
      fallback
    );
  } else {
    fallback();
  }
}

function restart() {
  state.qIdx = 0;
  state.answers = [];
  state.result = null;
  state.page = "cover";
  window.location.hash = '';
  render();
}

// ============ 启动 ============
loadFromHash();
render();
</script>
